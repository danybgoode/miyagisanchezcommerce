# CI/CD: build the Next.js frontend image and deploy to Cloud Run on every
# push to main. Wired via a Cloud Build trigger on the miyagisanchezcommerce
# repo (see infra/gcp/cicd-setup-frontend.sh). Build context is this repo
# root (= apps/miyagisanchez). Cloned from apps/backend/cloudbuild.yaml's shape.
#
# The deploy step only swaps the image — env vars, secrets, SA and scaling
# were set once by infra/gcp/deploy-frontend.sh and Cloud Run preserves them
# across image-only deploys. Vercel prod deploy is untouched by this trigger —
# both rails fire independently on the same push (S1.4 shadow soak).
#
# deploy-pipeline-tuning S2: registry-backed BuildKit layer cache via buildx
# (mirrors apps/backend/cloudbuild.yaml's S2 change — see its comment for the
# full "why not plain inline cache" reasoning). This app's Dockerfile has a
# cleaner single-`npm ci`-stage shape than the backend's (no regenerated
# build-artifact between stages), so this is expected to be a full win, not
# a partial one — confirmed locally: a source-only change (no package.json/
# lockfile change) hits `RUN npm ci` as CACHED in the `deps` stage. The
# runner stage's `RUN npm install sharp` is unaffected either way — it's a
# deliberate, unrelated fresh-reinstall-every-build workaround (standalone
# tracing doesn't reliably bundle sharp's native binary), not something this
# caching change tries to skip.

substitutions:
  _REGION: us-east4
  _AR_REPO: frontend
  _SERVICE: miyagi-web
  # NEXT_PUBLIC_* routing vars with stable literal defaults (identical to
  # infra/gcp/deploy-frontend.sh's :-defaults — kept in parity by
  # infra/gcp/test/frontend-build-args.test.js). The real publishable/anon
  # keys are NOT here — they come from Secret Manager via availableSecrets
  # below, matching how every other credential in this repo is rotated.
  _NEXT_PUBLIC_MEDUSA_STORE_URL: 'https://api.miyagisanchez.com'
  _NEXT_PUBLIC_SITE_URL: 'https://miyagisanchez.com'
  _NEXT_PUBLIC_CLERK_SIGN_IN_URL: '/sign-in'
  _NEXT_PUBLIC_CLERK_SIGN_UP_URL: '/sign-up'
  _NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: '/'
  _NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: '/'
  # GTM container id — public by definition (visible in every page's gtm.js URL).
  # Was Vercel-only env; the 2026-07-10 Cloud Run cutover silently dropped it and
  # analytics went dark (found by the nextpublic-buildtime-inlining-audit seed).
  _NEXT_PUBLIC_GTM_ID: 'GTM-MWHVLJ3M'
  # Concierge WhatsApp for print ads — value was Vercel-only (write-only, not
  # recoverable from any repo/GCP source); empty default preserves today's
  # server-side '' fallback until Daniel sets the trigger substitution.
  _NEXT_PUBLIC_MIYAGI_WHATSAPP: ''

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY/versions/latest
      env: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY/versions/latest
      env: NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_MEDUSA_MXN_REGION_ID/versions/latest
      env: NEXT_PUBLIC_MEDUSA_MXN_REGION_ID
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_MP_PUBLIC_KEY/versions/latest
      env: NEXT_PUBLIC_MP_PUBLIC_KEY
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY/versions/latest
      env: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    # Reuses the EXISTING SUPABASE_URL secret (already provisioned + bound
    # server-side) rather than creating a second copy of the same value.
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_URL/versions/latest
      env: NEXT_PUBLIC_SUPABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_ANON_KEY/versions/latest
      env: NEXT_PUBLIC_SUPABASE_ANON_KEY
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_VAPID_PUBLIC_KEY/versions/latest
      env: NEXT_PUBLIC_VAPID_PUBLIC_KEY

steps:
  - id: buildx-bootstrap
    name: gcr.io/cloud-builders/docker
    args:
      - buildx
      - create
      - --name
      - cloudbuildx
      - --driver
      - docker-container
      - --use

  - id: build-and-push
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    secretEnv:
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
      - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY
      - NEXT_PUBLIC_MEDUSA_MXN_REGION_ID
      - NEXT_PUBLIC_MP_PUBLIC_KEY
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
      - NEXT_PUBLIC_SUPABASE_URL
      - NEXT_PUBLIC_SUPABASE_ANON_KEY
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY
    args:
      - -c
      - |
        docker buildx build \
          --builder cloudbuildx \
          --cache-from type=registry,ref=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:buildcache \
          --cache-to type=registry,ref=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:buildcache,mode=max \
          --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="$$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" \
          --build-arg NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY="$$NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY" \
          --build-arg NEXT_PUBLIC_MEDUSA_MXN_REGION_ID="$$NEXT_PUBLIC_MEDUSA_MXN_REGION_ID" \
          --build-arg NEXT_PUBLIC_MP_PUBLIC_KEY="$$NEXT_PUBLIC_MP_PUBLIC_KEY" \
          --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="$$NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY" \
          --build-arg NEXT_PUBLIC_SUPABASE_URL="$$NEXT_PUBLIC_SUPABASE_URL" \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
          --build-arg NEXT_PUBLIC_VAPID_PUBLIC_KEY="$$NEXT_PUBLIC_VAPID_PUBLIC_KEY" \
          --build-arg NEXT_PUBLIC_MEDUSA_STORE_URL="${_NEXT_PUBLIC_MEDUSA_STORE_URL}" \
          --build-arg NEXT_PUBLIC_SITE_URL="${_NEXT_PUBLIC_SITE_URL}" \
          --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL="${_NEXT_PUBLIC_CLERK_SIGN_IN_URL}" \
          --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_URL="${_NEXT_PUBLIC_CLERK_SIGN_UP_URL}" \
          --build-arg NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL="${_NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL}" \
          --build-arg NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL="${_NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL}" \
          --build-arg NEXT_PUBLIC_GTM_ID="${_NEXT_PUBLIC_GTM_ID}" \
          --build-arg NEXT_PUBLIC_MIYAGI_WHATSAPP="${_NEXT_PUBLIC_MIYAGI_WHATSAPP}" \
          --push \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:$SHORT_SHA \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:latest \
          .

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:$SHORT_SHA'
      - '--region=${_REGION}'
      - --quiet
